<!-- Carta definitiva de eventos. El listado de platos se carga en vivo desde Supabase
     (tabla carta_eventos_items) — para cambiar precios/platos usar /admin/carta-eventos,
     no editar esta lista a mano. -->
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Eventos — Doña Dominga</title>
  <link rel="icon" type="image/jpeg" href="/Logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,600&family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #161311;
      --surface: #1f1b19;
      --ink: #eae1dd;
      --muted: #d0c5af;
      --accent: #ff5c22;
      --accent-soft: #ffb68c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Manrope', sans-serif;
      padding: 0 0 60px 0;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .masthead {
      text-align: center;
      padding: 56px 24px 34px 24px;
      border-bottom: 1px solid rgba(255, 92, 34, 0.18);
      margin-bottom: 38px;
    }

    .masthead .logo {
      width: 96px;
      height: 96px;
      object-fit: cover;
      border: 2px solid rgba(255, 92, 34, 0.45);
      margin-bottom: 14px;
    }

    .masthead .brand {
      font-family: 'Playfair Display', serif;
      line-height: 1;
      margin: 0;
    }

    .masthead .brand .eyebrow-word {
      display: block;
      font-style: italic;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.3px;
      color: color-mix(in srgb, var(--ink) 90%, transparent);
      margin-bottom: 8px;
    }

    .masthead .brand .name-word {
      display: block;
      font-weight: 800;
      letter-spacing: -0.5px;
      font-size: 44px;
      background-image: linear-gradient(100deg, #fff8f0 0%, #ffd9b8 55%, #ff8a50 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 18px rgba(255, 92, 34, 0.35));
      padding-bottom: 0.15em;
      margin-bottom: -0.15em;
    }

    .masthead .place {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .masthead .doctitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 20px;
      color: var(--accent-soft);
      margin-top: 22px;
    }

    .masthead .tagline {
      font-size: 12.5px;
      color: var(--muted);
      max-width: 420px;
      margin: 8px auto 0 auto;
      line-height: 1.5;
    }

    .section {
      margin-bottom: 36px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink);
      border-left: 4px solid var(--accent);
      padding-left: 12px;
      margin-bottom: 16px;
    }

    .section-note {
      font-size: 11px;
      color: var(--accent-soft);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: -8px 0 14px 16px;
      text-transform: none;
    }

    .item {
      margin-bottom: 14px;
    }

    .item-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .item-name {
      font-family: 'Playfair Display', serif;
      font-weight: 300;
      font-size: 16px;
      color: var(--ink);
      white-space: nowrap;
    }

    .item-slash {
      color: var(--accent);
      font-weight: 700;
    }

    .leader {
      flex: 1;
      border-bottom: 1px dotted rgba(208, 197, 175, 0.4);
      margin: 0 2px;
      transform: translateY(-3px);
      min-width: 20px;
    }

    .item-price {
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--accent-soft);
      white-space: nowrap;
    }

    .item-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-style: italic;
      line-height: 1.4;
    }

    .callout {
      border: 1px solid rgba(255, 92, 34, 0.25);
      background: var(--surface);
      padding: 14px 18px;
      font-size: 12.5px;
      color: var(--muted);
      text-align: center;
      margin: 10px 0 36px 0;
    }

    .callout b {
      color: var(--accent-soft);
    }

    footer {
      text-align: center;
      padding: 30px 24px 0 24px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b6259;
    }

    footer .fline {
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 16px auto;
    }

    footer .back-link {
      display: inline-block;
      margin-top: 4px;
      color: var(--accent-soft);
      text-decoration: none;
      letter-spacing: 2px;
    }

    footer .back-link:hover {
      color: var(--accent);
    }

    .menu-status {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="masthead">
      <img class="logo" src="/Logo.jpg" alt="Doña Dominga" />
      <h1 class="brand"><span class="eyebrow-word">Terraza</span><span class="name-word">Doña Dominga</span></h1>
      <div class="place">Santa Victoria - Mallarauco &middot; Desde 1993</div>
      <p class="doctitle">&ldquo;Carta Eventos&rdquo;</p>
    </div>
    <div id="menu-items">
      <p class="menu-status">Cargando carta…</p>
    </div>

    <footer>
      <div class="fline"></div>
      <a class="back-link" href="/">&larr; Volver al sitio de Terraza Doña Dominga</a>
    </footer>
  </div>

  <script>
    // Esta carta se alimenta en vivo desde Supabase (tabla carta_eventos_items).
    // Los cambios de precios/platos se hacen desde /admin/carta-eventos, NO editando este archivo.
    var SUPABASE_URL = "https://nbezmlsvoqisqjeacwhq.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZXptbHN2b3Fpc3FqZWFjd2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NjY0MDQsImV4cCI6MjEwMDM0MjQwNH0.72u-qNOXkfT1SsaGt1N9_h8AzJYVYMcPZIlzFJSzdbk";

    function formatCLP(amount) {
      return "$" + Math.round(amount).toLocaleString("es-CL");
    }

    function escapeHtml(str) {
      var div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    var container = document.getElementById("menu-items");

    fetch(
      SUPABASE_URL +
        "/rest/v1/carta_eventos_items?select=*&available=eq.true&order=group.asc,sort_order.asc",
      {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: "Bearer " + SUPABASE_ANON_KEY,
        },
      }
    )
      .then(function (res) {
        if (!res.ok) throw new Error("Error al cargar la carta");
        return res.json();
      })
      .then(function (items) {
        if (!items.length) {
          container.innerHTML =
            '<p class="menu-status">La carta se está actualizando, vuelve pronto.</p>';
          return;
        }

        var groups = [];
        var groupIndex = {};
        items.forEach(function (item) {
          if (!(item.group in groupIndex)) {
            groupIndex[item.group] = groups.length;
            groups.push({ name: item.group, items: [] });
          }
          groups[groupIndex[item.group]].items.push(item);
        });

        container.innerHTML = "";
        groups.forEach(function (group) {
          var section = document.createElement("div");
          section.className = "section";

          var title = document.createElement("div");
          title.className = "section-title";
          title.textContent = group.name;
          section.appendChild(title);

          group.items.forEach(function (item) {
            var itemEl = document.createElement("div");
            itemEl.className = "item";
            itemEl.innerHTML =
              '<div class="item-row"><span class="item-name">' +
              escapeHtml(item.name) +
              '</span><span class="leader"></span><span class="item-price">' +
              formatCLP(item.price) +
              "</span></div>" +
              (item.description
                ? '<div class="item-desc">' + escapeHtml(item.description) + "</div>"
                : "");
            section.appendChild(itemEl);
          });

          container.appendChild(section);
        });
      })
      .catch(function (err) {
        container.innerHTML =
          '<p class="menu-status">No pudimos cargar la carta. Intenta recargar la página.</p>';
        console.error(err);
      });
  </script>
</body>

</html>
